<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeAlpha Store</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-page="home">
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="/index.html"><span class="brand-mark">CA</span><span>CodeAlpha Store</span></a>
      <div class="nav-links" id="navLinks"></div>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-inner">
        <h1>CodeAlpha Store</h1>
        <p>Shop curated electronics, fashion, home essentials, and sports gear through a polished full-stack e-commerce experience.</p>
        <a class="btn" href="/products.html">Shop Products</a>
      </div>
    </section>

    <section class="container">
      <div class="section-head">
        <div>
          <h2>Featured Products</h2>
          <p>Fresh inventory from the sample catalog.</p>
        </div>
        <div class="row" id="categoryBar"></div>
      </div>
      <div id="pageMessage"></div>
      <div class="grid" id="featuredGrid"></div>
    </section>
  </main>

  <footer class="footer">Built for the CodeAlpha internship full-stack project.</footer>
  <script src="/js/app.js"></script>
</body>
</html>
